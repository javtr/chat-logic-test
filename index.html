<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Prueba Logic Bot</title>
    <style>
        body { font-family: sans-serif; background: #1a1a1a; color: white; display: flex; flex-direction: column; align-items: center; padding: 50px; }
        #chat-box { width: 100%; max-width: 600px; height: 400px; border: 1px solid #444; background: #222; overflow-y: auto; padding: 20px; border-radius: 10px; margin-bottom: 20px; }
        .msg { margin-bottom: 15px; padding: 10px; border-radius: 5px; line-height: 1.4; }
        .user { background: #0056b3; text-align: right; margin-left: 20%; }
        .bot { background: #333; text-align: left; margin-right: 20%; border-left: 4px solid #00ff88; }
        input { width: 100%; max-width: 600px; padding: 15px; border-radius: 5px; border: none; outline: none; font-size: 16px; }
        button { margin-top: 10px; padding: 10px 20px; cursor: pointer; background: #00ff88; border: none; font-weight: bold; border-radius: 5px; }
    </style>
</head>
<body>
    <h2>LOF Assistant Tester</h2>
    <div id="chat-box"></div>
    <input type="text" id="userInput" placeholder="Escribe tu duda sobre la suite LOF..." onkeypress="if(event.key === 'Enter') sendMessage()">
    <button onclick="sendMessage()">Enviar Mensaje</button>

    <script>
        async function sendMessage() {
            const input = document.getElementById('userInput');
            const box = document.getElementById('chat-box');
            const message = input.value;
            if(!message) return;

            // Mostrar mensaje del usuario
            box.innerHTML += `<div class="msg user">${message}</div>`;
            input.value = '';
            box.scrollTop = box.scrollHeight;

            try {
                const response = await fetch('https://chat.logicindicators.com/ask', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message: message })
                });
                const data = await response.json();
                
                // Mostrar respuesta del bot
                box.innerHTML += `<div class="msg bot">${data.response}</div>`;
            } catch (error) {
                box.innerHTML += `<div class="msg bot" style="color: red;">Error: No se pudo conectar con el servidor.</div>`;
            }
            box.scrollTop = box.scrollHeight;
        }
    </script>
</body>
</html>
