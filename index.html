<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>LOF Assistant - Logic Indicators</title>
    <style>
        body { font-family: sans-serif; background: #1a1a1a; color: white; display: flex; flex-direction: column; align-items: center; padding: 50px; }
        #chat-box { width: 100%; max-width: 600px; height: 400px; border: 1px solid #444; background: #222; overflow-y: auto; padding: 20px; border-radius: 10px; margin-bottom: 20px; }
        .msg { margin-bottom: 15px; padding: 10px; border-radius: 5px; line-height: 1.4; word-wrap: break-word; }
        .user { background: #0056b3; text-align: right; margin-left: 20%; }
        .bot { background: #333; text-align: left; margin-right: 20%; border-left: 4px solid #00ff88; white-space: pre-wrap; }
        
        /* Indicador de carga */
        .typing { font-style: italic; color: #888; font-size: 0.9em; }
        .dots:after {
            content: '.';
            animation: dots 1.5s steps(5, end) infinite;
        }
        @keyframes dots {
            0%, 20% { content: '.'; }
            40% { content: '..'; }
            60% { content: '...'; }
            80%, 100% { content: ''; }
        }

        input { width: 100%; max-width: 600px; padding: 15px; border-radius: 5px; border: none; outline: none; font-size: 16px; background: #333; color: white; }
        button { margin-top: 10px; padding: 10px 20px; cursor: pointer; background: #00ff88; border: none; font-weight: bold; border-radius: 5px; color: #1a1a1a; }
        button:hover { background: #00cc6e; }
    </style>
</head>
<body>
    <h2>LOF Assistant Tester</h2>
    <div id="chat-box"></div>
    <input type="text" id="userInput" placeholder="Escribe tu duda sobre la suite LOF..." onkeypress="if(event.key === 'Enter') sendMessage()">
    <button onclick="sendMessage()">Enviar Mensaje</button>

    <script>
        async function sendMessage() {
            const input = document.getElementById('userInput');
            const box = document.getElementById('chat-box');
            const message = input.value;
            if(!message) return;

            // 1. Mostrar mensaje del usuario
            box.innerHTML += `<div class="msg user">${message}</div>`;
            input.value = '';
            
            // 2. Mostrar indicador de "Pensando"
            const typingId = 'typing-' + Date.now();
            box.innerHTML += `<div id="${typingId}" class="msg bot typing">El experto está analizando tu consulta<span class="dots"></span></div>`;
            box.scrollTop = box.scrollHeight;

            try {
                const response = await fetch('https://chat.logicindicators.com/ask', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message: message })
                });

                if (!response.ok) throw new Error('Error en el servidor');

                // 3. Quitar indicador de carga
                const typingDiv = document.getElementById(typingId);
                if (typingDiv) typingDiv.remove();

                // 4. Crear el contenedor para la respuesta progresiva
                let botMsgDiv = document.createElement('div');
                botMsgDiv.className = 'msg bot';
                box.appendChild(botMsgDiv);

                // 5. Leer el flujo de datos (Streaming)
                const reader = response.body.getReader();
                const decoder = new TextDecoder();

                while (true) {
                    const { done, value } = await reader.read();
                    if (done) break;
                    
                    // Decodificar el fragmento y añadirlo al div
                    const chunk = decoder.decode(value, { stream: true });
                    botMsgDiv.textContent += chunk; 
                    
                    // Hacer scroll automático mientras aparece el texto
                    box.scrollTop = box.scrollHeight;
                }

            } catch (error) {
                const typingDiv = document.getElementById(typingId);
                if (typingDiv) typingDiv.remove();
                box.innerHTML += `<div class="msg bot" style="color: #ff4444;">Error: ${error.message}</div>`;
            }
            box.scrollTop = box.scrollHeight;
        }
    </script>
</body>
</html>
